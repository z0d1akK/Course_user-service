databaseChangeLog:
  - changeSet:
      id: 002-create-payment-cards-table
      author: zodiakk

      changes:
        - createTable:
            tableName: payment_cards
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: number
                  type: varchar(16)
                  constraints:
                    nullable: false

              - column:
                  name: holder
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: expiration_date
                  type: varchar(5)
                  constraints:
                    nullable: false

              - column:
                  name: active
                  type: boolean
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: payment_cards
            columnNames: user_id, number
            constraintName: uq_payment_cards_user_number