databaseChangeLog:
  - changeSet:
      id: 003-add-users-indexes
      author: zodiakk

      changes:
        - createIndex:
            tableName: users
            indexName: idx_users_name

            columns:
              - column:
                  name: name

        - createIndex:
            tableName: users
            indexName: idx_users_surname

            columns:
              - column:
                  name: surname